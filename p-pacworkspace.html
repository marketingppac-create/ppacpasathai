  <style>
    /* Premium Typography & Smooth Scrolling */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
    
    body {
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;

    }

    /* Refined Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active{
        -webkit-box-shadow: 0 0 0 30px white inset !important;
        -webkit-text-fill-color: #334155 !important;

    }
  </style>

  <!-- ADMIN MODAL -->
  <div id="adminModal" class="hidden fixed inset-0 z-[1000005] bg-slate-900/20 backdrop-blur-md flex items-center justify-center p-6 transition-all duration-500">
    <div class="w-full max-w-2xl bg-white/95 backdrop-blur-3xl border border-white shadow-[0_30px_80px_-20px_rgba(0,0,0,0.15)] rounded-[2.5rem] p-10 sm:p-12 relative">
      
      <div class="flex justify-between items-center mb-10">

        <input type="text" id="newAdminPass" placeholder="Password" class="w-full px-5 py-3.5 bg-white border border-slate-100 rounded-xl text-sm focus:outline-none focus:border-slate-300 focus:ring-4 focus:ring-slate-100/50 transition-all placeholder:text-slate-300">
        <button id="addAdminUserBtn" class="bg-slate-900 text-white px-6 py-3.5 rounded-xl hover:bg-slate-800 transition-all duration-300 shadow-lg shadow-slate-900/10 flex items-center justify-center min-w-[3.5rem]">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <i data-lucide="users" class="w-3 h-3"></i> User Database
          </h3>
          <div class="bg-slate-50/50 border border-slate-100 rounded-2xl p-3 h-64 overflow-y-auto">
            <ul id="userListContainer" class="space-y-2 text-sm"></ul>
          </div>
        </div>
        <div>
          <h3 class="text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400 mb-4 flex items-center gap-2">
            <i data-lucide="activity" class="w-3 h-3"></i> System Logs
          </h3>
          <div class="bg-slate-50/50 border border-slate-100 rounded-2xl p-3 h-64 overflow-y-auto">

  <script>
    lucide.createIcons();
    const API_URL = 'https://script.google.com/macros/s/AKfycbwnfw-nQ6k0F-pFyxcACsPGhd-_LQAuCEkGiSylYV8NofeNU3N5ZzxxsaAw-w-5io7J_A/exec';

    // --- Vertical Expandable Menu Logic with Icon Swap ---
    const toggleMenuBtn = document.getElementById('toggleMenuBtn');
    const expandedMenu = document.getElementById('expandedMenu');
    const iconOpen = document.getElementById('iconOpen');
    const iconClose = document.getElementById('iconClose');
    let isMenuExpanded = false;

    // Add function to toggle menu state
    function toggleMenu() {
        isMenuExpanded = !isMenuExpanded;
        if (isMenuExpanded) {
            // Show Pop-up Menu
            expandedMenu.classList.remove('opacity-0', 'translate-y-6', 'scale-95', 'pointer-events-none');
            expandedMenu.classList.add('opacity-100', 'translate-y-0', 'scale-100', 'pointer-events-auto');
            
            // Swap to Close Icon
            iconOpen.classList.replace('scale-100', 'scale-50');
            iconOpen.classList.replace('rotate-0', '-rotate-90');
            iconOpen.classList.replace('opacity-100', 'opacity-0');
            
            iconClose.classList.replace('scale-50', 'scale-100');
            iconClose.classList.replace('rotate-90', 'rotate-0');
            iconClose.classList.replace('opacity-0', 'opacity-100');
        } else {
            // Hide Pop-up Menu
            expandedMenu.classList.add('opacity-0', 'translate-y-6', 'scale-95', 'pointer-events-none');
            expandedMenu.classList.remove('opacity-100', 'translate-y-0', 'scale-100', 'pointer-events-auto');
            
            // Swap back to Menu/Grid Icon
            iconOpen.classList.replace('scale-50', 'scale-100');
            iconOpen.classList.replace('-rotate-90', 'rotate-0');
            iconOpen.classList.replace('opacity-0', 'opacity-100');
            
            iconClose.classList.replace('scale-100', 'scale-50');
            iconClose.classList.replace('rotate-0', 'rotate-90');
            iconClose.classList.replace('opacity-100', 'opacity-0');
        }
    }

    toggleMenuBtn.addEventListener('click', toggleMenu);

    // Auto-close menu when a link inside it is clicked
    const menuLinks = document.querySelectorAll('.menu-link');
    menuLinks.forEach(link => {
        link.addEventListener('click', () => {
            if (isMenuExpanded) {
                toggleMenu(); // Fold the menu automatically after selection
            }
        });
    });

    async function callAPI(action, payload = {}) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: action, ...payload })
        });
        return await response.json();
      } catch (error) {
        return { success: false, error: "Network Error" };
      }
    }

    // --- Session Management ---
    function checkActiveSession() {
      const activeUser = localStorage.getItem('ppac_active_user');
      if (activeUser) {
        document.getElementById('displayUsername').innerText = activeUser;
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('dashboardView').classList.remove('hidden');
        document.getElementById('dashboardView').classList.add('block');
      }
    }
    checkActiveSession();

    // --- Login Logic ---
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        
        if(!user || !pass) return;
        errorMsg.classList.add('hidden');
        submitBtn.innerHTML = '<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div><span class="tracking-[0.1em]">AUTHENTICATING</span>';
        submitBtn.disabled = true;

        const result = await callAPI('login', { user: user, pass: pass });

        if (result.success) {
            localStorage.setItem('ppac_active_user', user);
            location.reload(); 
        } else {
            document.getElementById('errorText').innerText = result.error ? 'Database connection failed' : 'Incorrect credentials';
            errorMsg.classList.remove('hidden');
            errorMsg.classList.add('flex');
            submitBtn.innerHTML = '<i data-lucide="arrow-right" class="w-4 h-4"></i><span>SIGN IN</span>';
            lucide.createIcons();
            submitBtn.disabled = false;
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('ppac_active_user');
        location.reload();
    });

    // --- Secret Admin Panel ---
    let clicks = 0;
    document.getElementById('secretTriggerLogin').addEventListener('click', () => {
      clicks++;
      if (clicks >= 5) { openAdmin(); clicks = 0; }
      setTimeout(() => clicks = 0, 2000);
    });

    async function openAdmin() {
      const modal = document.getElementById('adminModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      // Adding a small delay for animation effect
      setTimeout(() => {
          modal.firstElementChild.classList.add('scale-100', 'opacity-100');
      }, 10);
      await Promise.all([renderUsers(), renderLogs()]);
    }

    document.getElementById('closeAdminBtn').addEventListener('click', () => {
      document.getElementById('adminModal').classList.add('hidden');
    });

    async function renderUsers() {
      const res = await callAPI('getUsers');
      const container = document.getElementById('userListContainer');
      container.innerHTML = '';
      if(res.success) {
        res.users.forEach(u => {
          const li = document.createElement('li');
          li.className = "flex justify-between items-center p-3.5 bg-white rounded-xl shadow-sm border border-slate-100 transition-all hover:shadow-md";
          li.innerHTML = `
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100">
                <i data-lucide="user" class="w-3.5 h-3.5 text-slate-400"></i>
              </div>
              <div class="flex flex-col">
                <span class="font-medium text-slate-700">${u.username}</span>
                <span class="text-[10px] text-slate-400 tracking-widest uppercase">${u.password}</span>
              </div>
            </div>
            ${u.username !== 'admin' ? `<button onclick="deleteUser('${u.username}')" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '<span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-medium tracking-wide">OWNER</span>'}`;
          container.appendChild(li);
        });
        lucide.createIcons();
      }
    }

    async function renderLogs() {
      const res = await callAPI('getLogs');
      const container = document.getElementById('logListContainer');
      container.innerHTML = '';
      if(res.success) {
        res.logs.forEach(l => {
          const li = document.createElement('li');
          li.className = "p-3 bg-white rounded-xl border border-slate-100 mb-2 shadow-sm flex flex-col gap-1";
          const isSuccess = l.status === 'Success';
          li.innerHTML = `
            <div class="flex justify-between items-center">
              <span class="font-medium text-slate-700">${l.username}</span> 
              <span class="${isSuccess ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-500'} px-2 py-0.5 rounded-md text-[9px] font-medium tracking-wide uppercase">${l.status}</span>
            </div>
            <div class="text-[10px] text-slate-400 font-light tracking-wide">${l.time}</div>`;
          container.appendChild(li);
        });
      }
    }

    window.deleteUser = async (user) => {
      if(confirm(`Delete user: ${user}?`)) {
        await callAPI('deleteUser', { user: user });
        renderUsers();
      }
    }

    document.getElementById('addAdminUserBtn').addEventListener('click', async () => {
      const btn = document.getElementById('addAdminUserBtn');
      const u = document.getElementById('newAdminUser').value;
      const p = document.getElementById('newAdminPass').value;
      
      if(u && p) {
        btn.innerHTML = '<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>';
        await callAPI('addUser', { user: u, pass: p });
        document.getElementById('newAdminUser').value = '';
        document.getElementById('newAdminPass').value = '';
        await renderUsers();
        btn.innerHTML = '<i data-lucide="plus" class="w-5 h-5"></i>';
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
