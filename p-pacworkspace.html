<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>P-PAC WORKSPACE</title>
  
  <!-- โหลด Tailwind CSS ผ่าน CDN เพื่องานดีไซน์ -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- โหลด Lucide Icons ผ่าน CDN สำหรับไอคอนต่างๆ -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gradient-to-br from-[#fdfdfd] to-[#e2e2e2] font-sans text-gray-700 m-0 p-0">

  <!-- ================= หน้าจอ Login ================= -->
  <div id="loginView" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white/45 backdrop-blur-xl border border-white/90 shadow-[0_10px_40px_0_rgba(0,0,0,0.08)] rounded-3xl p-8 relative overflow-hidden">
        
        <!-- Decorative bg สำหรับความเงางาม Metallic -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-gray-400/30 to-transparent"></div>

        <div class="text-center mb-8">
          <!-- จุดซ่อนความลับที่ 1: กดคำว่า P-PAC 5 ครั้ง -->
          <h2 id="secretTriggerLogin" class="text-xl font-light tracking-[0.2em] text-gray-600 uppercase mb-2 cursor-default select-none">P-PAC</h2>
          <h3 class="text-sm tracking-wider text-gray-400 uppercase">Workspace Access</h3>
        </div>

        <form id="loginForm" class="space-y-4">
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="user" class="text-gray-400 w-4 h-4"></i>
            </div>
            <input type="text" id="username" placeholder="Username" class="w-full pl-10 pr-4 py-3 bg-white/50 border border-white/80 rounded-xl text-sm focus:bg-white/90 focus:border-white focus:ring-2 focus:ring-white/50 focus:outline-none transition-all shadow-[inset_0_2px_5px_rgba(0,0,0,0.02)]">
          </div>
          
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="text-gray-400 w-4 h-4"></i>
            </div>
            <input type="password" id="password" placeholder="Password" class="w-full pl-10 pr-4 py-3 bg-white/50 border border-white/80 rounded-xl text-sm focus:bg-white/90 focus:border-white focus:ring-2 focus:ring-white/50 focus:outline-none transition-all shadow-[inset_0_2px_5px_rgba(0,0,0,0.02)]">
          </div>

          <!-- กล่องข้อความ Error (ซ่อนไว้ก่อน) -->
          <div id="errorMsg" class="hidden items-center gap-2 text-red-500 text-xs mt-2 bg-red-50/50 p-2 rounded-lg border border-red-100">
            <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
            <span id="errorText"></span>
          </div>

          <button type="submit" id="submitBtn" class="w-full mt-6 bg-gradient-to-br from-white to-[#e6e6e6] hover:from-[#f4f4f4] hover:to-[#d4d4d4] border border-white text-gray-600 font-semibold tracking-wide py-3.5 rounded-xl transition-all duration-300 shadow-[0_4px_15px_rgba(0,0,0,0.05)] hover:shadow-[0_6px_20px_rgba(0,0,0,0.1)] hover:-translate-y-0.5 flex justify-center items-center gap-2">
            <i data-lucide="log-in" class="w-4 h-4" id="btnIcon"></i>
            <span id="btnText">SIGN IN</span>
          </button>
        </form>
    </div>
  </div>

  <!-- ================= หน้าจอ Dashboard (Iframe จะถูกซ่อนไว้ตอนแรก) ================= -->
  <div id="dashboardView" class="hidden w-full h-screen relative overflow-hidden bg-[#fdfdfd]">
    
    <!-- จุดซ่อนความลับที่ 2: ปุ่มล่องหนมุมซ้ายล่างสุดของจอ กด 5 ครั้ง -->
    <div id="secretTriggerDash" class="fixed bottom-0 left-0 w-16 h-16 z-[1000000] cursor-default bg-transparent"></div>

    <!-- กลุ่มเมนูมุมขวาบน แบบลอย (Floating) ซ้อนอยู่เหนือ Iframe -->
    <div style="z-index: 1000000;" class="fixed top-4 right-4 flex items-center gap-3">
      
      <!-- ปุ่ม Report Page -->
      <a href="https://marketingppac-create.github.io/ppacpasathai/p-pacworkspace.html" target="_blank" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/70 backdrop-blur-md hover:bg-white border border-gray-200 transition-all text-gray-700 hover:text-blue-600 shadow-lg cursor-pointer no-underline">
        <i data-lucide="file-text" class="w-4 h-4"></i>
        <span class="font-medium text-sm hidden sm:inline">Report Page</span>
      </a>

      <!-- ปุ่ม Logout -->
      <button id="logoutBtn" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/70 backdrop-blur-md hover:bg-white border border-gray-200 transition-all text-gray-700 hover:text-red-500 shadow-lg cursor-pointer">
        <i data-lucide="log-out" class="w-4 h-4"></i>
        <span class="font-medium text-sm hidden sm:inline">Sign Out</span>
      </button>

    </div>

    <!-- นำ Iframe หน้า GAS ของคุณมาฝังแบบเต็มหน้าจอ -->
    <iframe 
      src="https://script.google.com/macros/s/AKfycby_PIFyhk7fIqLSGLaT6N05oAgTwdFD-5WM4ruvutVnXlAfBjJdAWOcQTmAuhQ1Wm5Clg/exec" 
      style="position: fixed; top: 0; bottom: 0; right: 0; width: 100%; border: none; margin: 0; padding: 0; overflow: hidden; z-index: 999999; height: 100%;"
      title="P-PAC WORKSPACE">
    </iframe>
  </div>

  <!-- ================= หน้าต่างลับสำหรับจัดการ User (Secret Admin Modal) ================= -->
  <div id="adminModal" class="hidden fixed inset-0 z-[1000005] bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity">
    <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white shadow-2xl rounded-3xl p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
          <i data-lucide="shield" class="w-5 h-5 text-indigo-500"></i>
          Secret User Management
        </h2>
        <button id="closeAdminBtn" class="text-gray-400 hover:text-gray-700">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- ฟอร์มเพิ่ม User ใหม่ -->
      <div class="flex gap-2 mb-6">
        <input type="text" id="newAdminUser" placeholder="New Username" class="w-1/2 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-indigo-400">
        <input type="text" id="newAdminPass" placeholder="Password" class="w-1/2 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-indigo-400">
        <button id="addAdminUserBtn" class="bg-indigo-500 hover:bg-indigo-600 text-white p-2 rounded-lg transition-colors">
          <i data-lucide="plus" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- รายชื่อ User -->
      <div class="bg-white/50 border border-gray-100 rounded-xl p-2 max-h-60 overflow-y-auto">
        <ul id="userListContainer" class="space-y-2">
          <!-- จะใช้ Javascript สร้างรายชื่อตรงนี้ -->
        </ul>
      </div>
    </div>
  </div>

  <!-- ================= ส่วนของ Javascript ================= -->
  <script>
    lucide.createIcons();

    // 1. ระบบจัดการฐานข้อมูลจำลอง (Local Storage)
    const DB_KEY = 'ppac_secret_users';
    
    // โหลดข้อมูล User ถ้าไม่มีให้ใช้ admin/1234 เป็นค่าเริ่มต้น
    function loadUsers() {
      const stored = localStorage.getItem(DB_KEY);
      if (stored) return JSON.parse(stored);
      // ค่าเริ่มต้น (ห้ามลบ)
      const defaultUsers = [{ username: 'admin', password: '1234' }];
      localStorage.setItem(DB_KEY, JSON.stringify(defaultUsers));
      return defaultUsers;
    }

    function saveUsers(usersArray) {
      localStorage.setItem(DB_KEY, JSON.stringify(usersArray));
    }

    let usersDB = loadUsers();

    // 2. อ้างอิง UI
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');
    const loginView = document.getElementById('loginView');
    const dashboardView = document.getElementById('dashboardView');
    const logoutBtn = document.getElementById('logoutBtn');

    // 3. จัดการการ Login โดยเช็คจาก usersDB
    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const user = usernameInput.value.trim();
        const pass = passwordInput.value.trim();
        
        errorMsg.classList.add('hidden');
        errorMsg.classList.remove('flex');
        
        submitBtn.innerHTML = '<div class="w-5 h-5 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></div>';
        submitBtn.disabled = true;

        setTimeout(() => {
            // เช็คว่ามี Username และ Password นี้ในฐานข้อมูลหรือไม่
            const isValidUser = usersDB.some(u => u.username === user && u.password === pass);

            if (isValidUser) {
                loginView.classList.add('hidden');
                loginView.classList.remove('flex');
                dashboardView.classList.remove('hidden');
                dashboardView.classList.add('block');
            } else {
                errorText.innerText = 'Username หรือ Password ไม่ถูกต้อง';
                errorMsg.classList.remove('hidden');
                errorMsg.classList.add('flex');
            }
            
            submitBtn.innerHTML = '<i data-lucide="log-in" class="w-4 h-4"></i><span>SIGN IN</span>';
            lucide.createIcons();
            submitBtn.disabled = false;
        }, 800);
    });

    logoutBtn.addEventListener('click', function() {
        usernameInput.value = '';
        passwordInput.value = '';
        dashboardView.classList.remove('block');
        dashboardView.classList.add('hidden');
        loginView.classList.remove('hidden');
        loginView.classList.add('flex');
    });

    // ========================================================
    // 4. ระบบลับ (Secret Easter Egg)
    // ========================================================
    let clickCount = 0;
    let clickTimer;

    function handleSecretClick() {
      clickCount++;
      clearTimeout(clickTimer);
      
      // ถ้ารัวครบ 5 ครั้ง ให้เปิดหน้าต่างลับ
      if (clickCount >= 5) {
        openAdminModal();
        clickCount = 0;
      } else {
        // ถ้ารีรอเกิน 1 วินาที ให้เริ่มนับใหม่
        clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
      }
    }

    // ผูก Event ให้จุดซ่อนความลับ
    document.getElementById('secretTriggerLogin').addEventListener('click', handleSecretClick);
    document.getElementById('secretTriggerDash').addEventListener('click', handleSecretClick);

    // ========================================================
    // 5. จัดการ UI ของหน้าต่างลับ (Admin Modal)
    // ========================================================
    const adminModal = document.getElementById('adminModal');
    const closeAdminBtn = document.getElementById('closeAdminBtn');
    const userListContainer = document.getElementById('userListContainer');
    const addAdminUserBtn = document.getElementById('addAdminUserBtn');
    const newAdminUser = document.getElementById('newAdminUser');
    const newAdminPass = document.getElementById('newAdminPass');

    function openAdminModal() {
      renderUserList();
      adminModal.classList.remove('hidden');
      adminModal.classList.add('flex');
    }

    closeAdminBtn.addEventListener('click', () => {
      adminModal.classList.add('hidden');
      adminModal.classList.remove('flex');
    });

    // วาดรายชื่อ User ลงในตาราง
    function renderUserList() {
      userListContainer.innerHTML = '';
      usersDB.forEach((u, index) => {
        const li = document.createElement('li');
        li.className = "flex justify-between items-center p-3 bg-white rounded-lg border border-gray-100 shadow-sm";
        
        // ถ้าเป็น admin ไม่ให้ลบ
        const isSuperAdmin = u.username === 'admin';
        
        li.innerHTML = `
          <div>
            <span class="font-medium text-gray-700 text-sm">${u.username}</span>
            <span class="text-xs text-gray-400 ml-2">Pass: ${u.password}</span>
          </div>
          ${isSuperAdmin ? 
            `<span class="text-xs text-indigo-400 bg-indigo-50 px-2 py-1 rounded">Super Admin</span>` : 
            `<button onclick="deleteUser(${index})" class="text-red-400 hover:text-red-600 p-1 rounded-md hover:bg-red-50 transition-colors">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>`
          }
        `;
        userListContainer.appendChild(li);
      });
      lucide.createIcons();
    }

    // ฟังก์ชันเพิ่ม User
    addAdminUserBtn.addEventListener('click', () => {
      const uName = newAdminUser.value.trim();
      const uPass = newAdminPass.value.trim();
      
      if (!uName || !uPass) {
        alert("กรุณากรอก Username และ Password ให้ครบถ้วน");
        return;
      }
      
      // เช็คว่าชื่อซ้ำไหม
      if (usersDB.some(u => u.username === uName)) {
        alert("Username นี้มีอยู่ในระบบแล้ว!");
        return;
      }

      usersDB.push({ username: uName, password: uPass });
      saveUsers(usersDB);
      renderUserList();
      
      // เคลียร์ช่องกรอก
      newAdminUser.value = '';
      newAdminPass.value = '';
    });

    // ฟังก์ชันลบ User (ต้องใช้ window. เพื่อให้ปุ่มใน HTML มองเห็น)
    window.deleteUser = function(index) {
      if (confirm(`คุณแน่ใจหรือไม่ที่จะลบ User: ${usersDB[index].username} ?`)) {
        usersDB.splice(index, 1);
        saveUsers(usersDB);
        renderUserList();
      }
    };

  </script>
</body>
</html>
