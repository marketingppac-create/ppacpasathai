<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-PAC Workspace</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter (English) & Prompt (Thai) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Sukhumvit Set', 'Prompt', '-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'sans-serif'],
                    },
                    colors: {
                        'apple-dark': '#1d1d1f',       /* Apple's signature dark text */
                        'apple-gray': '#f5f5f7',       /* Apple's standard light gray */
                        'apple-gray-hover': '#e8e8ed',
                        'apple-blue': '#0071e3',
                    },
                    boxShadow: {
                        'soft-wide': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'soft-wide-hover': '0 20px 40px -10px rgba(0,0,0,0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fbfbfd; /* Slightly off-white background to enhance depth */
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col justify-center py-16 selection:bg-[#0083fe] selection:text-white relative">

    <main class="w-full max-w-5xl mx-auto px-6 text-center relative">
        
        <!-- Background Ambient Glow (Optional for extra depth) -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-gradient-to-r from-[#00fff0] to-[#0083fe] rounded-full blur-[100px] opacity-10 pointer-events-none"></div>

        <!-- Large Minimalist Title -->
        <h1 class="text-5xl md:text-7xl font-semibold tracking-tighter mb-12 mt-8 text-[#333] relative z-10 pb-2">
            P-PAC Workspace
        </h1>

        <!-- Buttons Grid -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-5 relative z-10 flex-wrap">
            
            <!-- Button 1: สร้าง -->
            <a href="https://marketingppac-create.github.io/ppacpasathai/genarate.html" 
               class="w-full sm:w-[200px] px-8 py-3.5 bg-gradient-to-r from-[#00fff0] to-[#0083fe] text-white rounded-full font-medium text-[17px] hover:shadow-[0_10px_30px_-10px_rgba(0,131,254,0.6)] hover:-translate-y-0.5 transition-all duration-300">
                สร้าง
            </a>
            
            <!-- Button 2: ส่งงาน/ตรวจสอบ -->
            <a href="https://script.google.com/macros/s/AKfycbyyCZGljMoVixAgx2cvmNFFhr3ARbeoqjcgRAOhfigykdQchlYMCyg7X27KEt5rPzH-Ew/exec" 
               class="w-full sm:w-[200px] px-8 py-3.5 bg-gradient-to-r from-[#ff5f6d] to-[#ffc371] text-white rounded-full font-medium text-[17px] hover:shadow-[0_10px_30px_-10px_rgba(255,95,109,0.6)] hover:-translate-y-0.5 transition-all duration-300">
                ส่งงาน/ตรวจสอบ
            </a>

            <!-- Button 3: แจ้ง Requirement (Dev) -->
            <button onclick="openModal()" 
               class="w-full sm:w-[200px] px-8 py-3.5 bg-gradient-to-r from-gray-800 to-black text-white rounded-full font-medium text-[17px] hover:shadow-[0_10px_30px_-10px_rgba(0,0,0,0.4)] hover:-translate-y-0.5 transition-all duration-300">
                แจ้ง Requirement
            </button>

        </div>
    </main>

    <!-- Modal Form (Hidden by default) -->
    <div id="reqModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 px-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl transform scale-95 transition-transform duration-300" id="reqModalCard">
            <h2 class="text-2xl font-semibold mb-6 text-left text-apple-dark">เพิ่ม Requirement (Dev)</h2>
            <form id="reqForm" class="flex flex-col gap-5">
                
                <!-- ชื่อผู้ต้องการ Requirement (บังคับกรอก) -->
                <div class="text-left">
                    <label for="requester" class="block text-sm font-medium text-gray-700 mb-1.5">ชื่อผู้ต้องการ Requirement <span class="text-red-500">*</span></label>
                    <input type="text" id="requester" name="requester" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-apple-blue focus:border-transparent transition-all bg-apple-gray" 
                           placeholder="เช่น แอดมิน A, พี่บี">
                </div>
                
                <!-- รายละเอียด (บังคับกรอก) -->
                <div class="text-left">
                    <label for="details" class="block text-sm font-medium text-gray-700 mb-1.5">รายละเอียด <span class="text-red-500">*</span></label>
                    <textarea id="details" name="details" required rows="4" 
                              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-apple-blue focus:border-transparent transition-all bg-apple-gray resize-none" 
                              placeholder="ระบุความต้องการ เช่น ขอเพิ่มปุ่มพิมพ์เอกสาร..."></textarea>
                </div>
                
                <!-- ปุ่มกดยืนยัน -->
                <div class="flex justify-end gap-3 mt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-2.5 rounded-full text-gray-600 font-medium hover:bg-gray-100 transition-colors">ยกเลิก</button>
                    <button type="submit" id="submitBtn" class="px-8 py-2.5 bg-apple-blue text-white rounded-full font-medium hover:bg-blue-600 transition-colors flex items-center justify-center disabled:opacity-70 disabled:cursor-not-allowed">
                        บันทึก
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('reqModal');
        const modalCard = document.getElementById('reqModalCard');
        const form = document.getElementById('reqForm');
        const submitBtn = document.getElementById('submitBtn');

        // ฟังก์ชันเปิด Popup
        function openModal() {
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalCard.classList.remove('scale-95');
            modalCard.classList.add('scale-100');
        }

        // ฟังก์ชันปิด Popup
        function closeModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalCard.classList.remove('scale-100');
            modalCard.classList.add('scale-95');
            // ล้างข้อมูลในฟอร์มเมื่อปิด
            setTimeout(() => form.reset(), 300); 
        }

        // จับเหตุการณ์เมื่อกดปุ่มบันทึก (Submit)
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันหน้าเว็บ Refresh
            
            // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังบันทึก...';

            // !!!!!!!! สำคัญมาก: เอา URL จาก Google Apps Script (ของ Sheet ใหม่) มาใส่ตรงนี้ !!!!!!!!
            // อ้างอิง Sheet ใหม่: https://docs.google.com/spreadsheets/d/1M18Ed0sckfWBYTdofc39TniGeJWJ0cUFdA69lwtN6Fw/edit?usp=sharing
            const scriptURL = 'ใส่_URL_WEB_APP_ของ_คุณที่นี่'; 

            // เตรียมข้อมูลส่งไปให้ GAS
            const formData = new FormData(form);

            // ส่งข้อมูลด้วย Fetch API
            fetch(scriptURL, { 
                method: 'POST', 
                body: formData,
                mode: 'no-cors' // ช่วยป้องกันปัญหาเรื่อง Policy ข้ามโดเมน
            })
            .then(response => {
                alert('ส่ง Requirement ให้ Dev เรียบร้อยแล้ว!');
                closeModal();
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'บันทึก';
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'บันทึก';
            });
        });
    </script>
</body>
</html>
